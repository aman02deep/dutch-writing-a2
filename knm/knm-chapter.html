<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="copyright" content="© 2026 Dutch A2 Practice App. All rights reserved.">
    <meta name="description"
        content="Interactive Dutch A2 practice exercises for the Inburgeringsexamen. Master grammar, vocabulary, KNM, and writing with AI-powered feedback.">
    <meta name="keywords"
        content="Dutch A2, Inburgeringsexamen, NT2, learn Dutch, Dutch grammar, Dutch vocabulary, KNM practice">
    <meta property="og:title" content="KNM Chapter - Dutch A2">
    <meta property="og:description"
        content="Interactive Dutch A2 practice exercises for the Inburgeringsexamen. Master grammar, vocabulary, KNM, and writing with AI-powered feedback.">
    <meta property="og:type" content="website">
    <title>KNM Chapter - Dutch A2</title>
    <link rel="stylesheet" href="../css/common/style.css">
    <link rel="stylesheet" href="../css/common/navigation.css">
    <link rel="stylesheet" href="../css/common/settings.css">
    <link rel="stylesheet" href="../css/common/breadcrumb.css">
    <link rel="stylesheet" href="../css/common/ai-roleplay.css">
    <link rel="stylesheet" href="../css/knm/knm.css">
</head>

<body>
    <!-- Navigation Header -->
    <nav class="nav-header">
        <div class="nav-container">
            <a href="../index.html" class="nav-home">
                <span class="nav-home-icon">🏠</span>
                <span>Home</span>
            </a>
            <div class="nav-page-title" id="nav-title"><a href="knm.html" class="nav-parent-link">KNM Hub</a> <span
                    class="nav-separator">|</span> 🏛️ KNM Practice</div>
        </div>
    </nav>

    <div class="container" style="max-width: 100%; padding: 0;">
        <!-- Main Content -->
        <div class="chapter-container">
            <!-- Sidebar for Navigation -->
            <div class="chapter-sidebar">
                <div class="tab-container">
                    <button class="tab-btn active" data-tab="study" onclick="switchTab('study')">📚 Study
                        Lesson</button>
                    <button class="tab-btn" data-tab="practice" onclick="switchTab('practice')">✍️ Practice
                        Questions</button>
                </div>
            </div>

            <!-- Content Area -->
            <div class="chapter-main">

                <!-- Study Tab -->
                <div id="study-tab" class="tab-content active">
                    <div id="study-content">
                        <p style="color: #666; font-style: italic;">Loading study materials...</p>
                    </div>
                </div>

                <!-- Practice Tab -->
                <div id="practice-tab" class="tab-content">
                    <div id="practice-content">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <h3 style="margin: 0; color: var(--primary);">Practice Questions</h3>
                            <div class="score-badge" id="score-badge"
                                style="background: #e3f2fd; padding: 8px 16px; border-radius: 20px; font-weight: 600; color: var(--primary);">
                                Score: <span id="score-display">0/0</span>
                            </div>
                        </div>

                        <div id="questions-container">
                            <!-- Questions will be rendered here -->
                        </div>

                        <div class="knm-actions">
                            <button class="btn-knm btn-check-answers" onclick="checkAnswers()">Check Answers</button>
                            <button class="btn-knm btn-next-chapter" onclick="nextChapter()">Next Chapter →</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/common/common.js"></script>
    <script src="../js/knm/knm-lesson-data.js"></script>
    <script src="../js/knm/knm-player.js"></script>
    <script src="../js/knm/knm-questions.js"></script>
    <script src="../js/knm/knm.js"></script>
    <script src="../js/common/settings.js"></script>
    <script src="../js/common/ai-service.js"></script>
    <script src="../js/common/ai-roleplay.js"></script>
</body>

</html>
